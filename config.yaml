transcription:
  model: "base"
  device: "cpu"          # cpu, cuda, mps
  language: "auto"       # auto = detect, или "en", "ru", etc.

translation:
  model: "llama3.1:8b"
  ollama_url: "http://localhost:11434"

tts:
  model: "tts_models/multilingual/multi-dataset/xtts_v2"
  language: "ru"
  speaker: "Claribel Dervla"   # встроенный голос (игнорируется если задан speaker_wav)
  speaker_wav: null            # путь к WAV для клонирования голоса, или null

output:
  suffix: "_dubbed"
