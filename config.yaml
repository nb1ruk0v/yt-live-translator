transcription:
  model: "turbo"
  device: "cpu"          # cpu, cuda, mps
  language: "en"       # auto = detect, или "en", "ru", etc.

grouping:
  gap_threshold: 0.3     # сек — сегменты с gap меньше этого склеиваются
  max_duration: 12.0     # сек — верхний предел длительности склеенного сегмента (Silero ~1000 chars)

translation:
  model: "gemma4:e4b"
  ollama_url: "http://localhost:11434"

tts:
  model: "v4_ru"         # Silero RU model bundle
  language: "ru"
  speaker: "kseniya"      # aidar | eugene | baya | kseniya | xenia
  sample_rate: 48000

output:
  suffix: "_dubbed"
