[project]
name = "voice-translator"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "faster-whisper",
    "TTS",
    "ffmpeg-python",
    "requests",
    "pyyaml",
    "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/voice_translator"]
